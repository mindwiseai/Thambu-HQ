<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weight Transfer + Setup · ARKA</title>
<style>
:root{--bg:#0b0f14;--panel:#121821;--ink:#e6edf3;--muted:#8b95a3;--accent:#f43f5e;--accent2:#22d3ee;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444;--border:#1f2937}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Inter,system-ui,sans-serif;font-size:13px}
header{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.title{font-size:16px;font-weight:600}
.crumb{color:var(--muted);font-size:12px;margin-top:2px}
.crumb a{color:var(--muted);text-decoration:none;border-bottom:1px dashed #374151}
nav.tabs{display:flex;gap:4px;padding:0 22px;border-bottom:1px solid var(--border);background:#0f141c;position:sticky;top:0;z-index:10}
nav.tabs button{background:transparent;border:0;color:var(--muted);padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;font:inherit;font-size:13px}
nav.tabs button.active{color:var(--ink);border-bottom-color:var(--accent2)}
.toolbar{padding:10px 22px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
button.btn,select.btn,input.btn{background:#1a2332;border:1px solid #2a3447;color:var(--ink);padding:6px 11px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer}
button.btn:hover{background:#212c3f}
.section{padding:18px 22px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
@media(max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
.card h3{margin:0 0 10px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:600}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.row label{flex:1;color:var(--muted);font-size:12px}
.row input,.row select{width:90px;background:#0d131c;border:1px solid #1f2937;color:var(--ink);padding:5px 7px;border-radius:5px;font:inherit;text-align:right}
.row input.wide{width:100%;text-align:left}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px}
.kpi .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
.kpi .val{font-size:18px;font-weight:600;margin-top:3px}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:2px}
.bar-track{background:#1a2332;border-radius:99px;height:14px;overflow:hidden;display:flex}
.bar-front{background:var(--accent2);height:100%}
.bar-rear{background:var(--accent);height:100%}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
th,td{padding:5px 7px;border-bottom:1px solid #1a2332;text-align:right}
th:first-child,td:first-child{text-align:left;color:var(--muted)}
th{background:#0d131c;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:0.5px}
.muted{color:var(--muted)}
.pill{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.pill.good{background:rgba(34,197,94,.16);color:#86efac}
.pill.warn{background:rgba(245,158,11,.16);color:#fbbf24}
.pill.bad{background:rgba(239,68,68,.18);color:#fca5a5}
.profile-list{margin-top:8px;max-height:180px;overflow-y:auto;border:1px solid #1a2332;border-radius:6px}
.profile-item{padding:7px 10px;border-bottom:1px solid #1a2332;cursor:pointer;font-size:12px}
.profile-item:hover{background:#161e2a}
.profile-item.active{background:#1a2332;color:var(--accent2)}
.session-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.session-block{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
.session-block h4{margin:0 0 8px;font-size:12px;color:var(--accent2);text-transform:uppercase;letter-spacing:0.6px}
.lr-grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:5px;align-items:center;margin-bottom:6px}
.lr-grid .lbl{color:var(--muted);font-size:11px}
.lr-grid input{background:#0d131c;border:1px solid #1f2937;color:var(--ink);padding:4px 6px;border-radius:4px;font:inherit;text-align:right;width:100%}
@media print {
  nav,.toolbar,.no-print{display:none !important}
  body{background:#fff;color:#000}
  .card,.kpi,.session-block{border-color:#bbb;background:#fff;color:#000}
  th{background:#eee !important;color:#000 !important}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="title">Weight Transfer + Setup</div>
    <div class="crumb"><a href="../index.html">← All tools</a> · Smithees-style WTW · unified with session setup sheet</div>
  </div>
  <div>
    <select class="btn" id="unitSys">
      <option value="metric">Metric (kg, mm)</option>
      <option value="imperial">Imperial (lb, in)</option>
    </select>
  </div>
</header>

<nav class="tabs">
  <button data-tab="calc" class="active">WTW calculator</button>
  <button data-tab="camber">Camber kinematics</button>
  <button data-tab="setup">Session setup</button>
  <button data-tab="profiles">Car profiles</button>
</nav>

<div class="toolbar no-print">
  <button class="btn" onclick="newProfile()">+ New car</button>
  <button class="btn" onclick="dupProfile()">Duplicate</button>
  <button class="btn" onclick="deleteProfile()">Delete</button>
  <button class="btn" onclick="exportData()">Export JSON</button>
  <label class="btn" style="cursor:pointer">Import<input type="file" id="importFile" accept=".json" style="display:none" /></label>
  <button class="btn" onclick="window.print()">Print</button>
  <button class="btn" onclick="reset()">Reset seed</button>
  <span class="muted" style="margin-left:auto" id="autoSaveLbl">auto-saved</span>
</div>

<div id="view"></div>

<script>
// ─── Defaults seeded from the ARKA Polo rally car WTW workbook ───────────────
const SEED = [{
  id: 'polo-rally',
  name: 'VW Polo rally car (ARKA)',
  units: 'metric',
  inputs: {
    weight_f: 803.6, weight_r: 552.3,        // kg
    unsprung_f: 80.5, unsprung_r: 65.9,
    track_f: 1549, track_r: 1549,            // mm
    rc_f: 280, rc_r: 305,                    // mm
    cog_unsprung_f: 318, cog_unsprung_r: 318,
    cog_sprung: 686,
    spring_freq_f: 84, spring_freq_r: 118,   // CPM
    arb_od_f: 20, arb_id_f: 0,
    arb_od_r: 18, arb_id_r: 0,
    arb_len_f: 808, arb_len_r: 965,
    arb_arm_f: 285, arb_arm_r: 292,
    arb_motion_f: 0.5, arb_motion_r: 1.0,
    spring_rate_f: 168, spring_rate_r: 139,  // lb/in (will convert)
    spring_motion_f: 0.98, spring_motion_r: 1.10
  },
  // Suspension kinematics — front (Polo OEM is McPherson) + rear (twist beam, very low camber gain)
  // Coordinate system: looking from rear of car. X = lateral from wheel centerline (positive = outboard).
  // Z = vertical above ground (positive = up). All distances in mm.
  camber: {
    front: {
      type: 'mcpherson',
      lca: { inner_x: -270, inner_z: 150, outer_x: 70, outer_z: 140 },
      uca: { inner_x: -200, inner_z: 480, outer_x: 60, outer_z: 540 },
      strut_top: { x: -250, z: 720 },
      static_camber_deg: -2.5,
      travel_bump_mm: 60,
      travel_droop_mm: 60,
      step_mm: 5
    },
    rear: {
      type: 'wishbone',
      lca: { inner_x: -260, inner_z: 140, outer_x: 60, outer_z: 130 },
      uca: { inner_x: -180, inner_z: 400, outer_x: 55, outer_z: 460 },
      strut_top: { x: -220, z: 700 },
      static_camber_deg: -1.5,
      travel_bump_mm: 50,
      travel_droop_mm: 50,
      step_mm: 5
    }
  },
  setups: []
}];

const STORE = 'arka-wtw-v1';
let cars = load();
let currentId = cars[0]?.id;
let unitSys = 'metric';
let tab = 'calc';

function load(){
  try { const r = localStorage.getItem(STORE); if (r) return JSON.parse(r); } catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function save(){ localStorage.setItem(STORE, JSON.stringify(cars)); document.getElementById('autoSaveLbl').textContent = 'saved · '+new Date().toLocaleTimeString(); }
function getCurrent(){ return cars.find(c => c.id === currentId); }

// ─── Math (Smithees-style WTW) ──────────────────────────────────────────────
// Inputs in metric (kg, mm). Convert internally to imperial-ish for the Smithees formulas
// because the formulas were built around lb/in. We use SI form internally for clarity.
//
// Notation:
//   wF, wR = total axle weight (kg)
//   uF, uR = unsprung axle weight (kg)
//   sF, sR = wF-uF, wR-uR (sprung axle weight)
//   trF, trR = track (m)
//   rcF, rcR = roll centre height (m) above ground
//   cogU = unsprung COG height (m)
//   cogS = sprung-mass COG height (m)
//   For 1g lateral:
//     unsprung WT per axle  = (u * cogU) / track
//     RC WT per axle        = (sprung * rc) / track
//     sprung WT (chassis)   = (sprung_total * (cogS - mean_rc)) / mean_track
//     -> distributed front/rear by roll-resistance ratio
function calc(p){
  if (!p) return null;
  const i = p.inputs;
  const wF = i.weight_f, wR = i.weight_r;
  const uF = i.unsprung_f, uR = i.unsprung_r;
  const sF = wF - uF, sR = wR - uR;
  const sprung = sF + sR;
  const total = wF + wR;

  const trF = i.track_f / 1000, trR = i.track_r / 1000;
  const rcF = i.rc_f / 1000, rcR = i.rc_r / 1000;
  const cogUF = i.cog_unsprung_f / 1000, cogUR = i.cog_unsprung_r / 1000;
  const cogS = i.cog_sprung / 1000;

  // 1g lateral
  const uWT_F = (uF * cogUF) / trF;
  const uWT_R = (uR * cogUR) / trR;
  const rcWT_F = (sF * rcF) / trF;
  const rcWT_R = (sR * rcR) / trR;

  const cogSplit = sR / sprung; // % weight on rear
  const meanTrack = trF + (trR - trF) * cogSplit;
  const meanRC = rcF + (rcR - rcF) * cogSplit;
  const sprungWT = (sprung * (cogS - meanRC)) / meanTrack;

  // Wheel rate from spring frequency (ride frequency).
  //   f_Hz = (1/2π) · √(K/M)   →   K = (2π·f)² · M
  // M is the per-wheel sprung mass (kg); K comes out in N/m natively.
  const fF = i.spring_freq_f / 60, fR = i.spring_freq_r / 60;  // CPM → Hz
  const kF_wheel_Nm = Math.pow(2*Math.PI*fF, 2) * (sF/2);  // N/m per wheel
  const kR_wheel_Nm = Math.pow(2*Math.PI*fR, 2) * (sR/2);

  // ARB roll stiffness contribution at the wheel.
  // Torsion bar stiffness:  K_torsion = π · G · (OD⁴ − ID⁴) / (32 · L)   [N·mm/rad]
  // Wheel rate from a paired ARB:  k_wheel ≈ K_torsion / arm²            [N/mm]
  // Then × motion_ratio² for the rocker geometry.
  const arbRateNm = (od, id, arm, length) => {
    if (!od || !arm || !length) return 0;
    const G_steel_MPa = 79000; // N/mm² (≈79 GPa)
    const K_torsion = (Math.PI * G_steel_MPa * (Math.pow(od,4) - Math.pow(id,4))) / (32 * length); // N·mm/rad
    return (K_torsion / (arm * arm)) * 1000; // N/mm → N/m at wheel
  };
  const kF_arb_Nm = arbRateNm(i.arb_od_f, i.arb_id_f, i.arb_arm_f, i.arb_len_f) * Math.pow(i.arb_motion_f||1, 2);
  const kR_arb_Nm = arbRateNm(i.arb_od_r, i.arb_id_r, i.arb_arm_r, i.arb_len_r) * Math.pow(i.arb_motion_r||1, 2);

  // Roll resistance per axle:  M_roll = K · t² / 2   [N·m/rad]   (paired wheels, K in N/m, t in m)
  const rollResF = (kF_wheel_Nm + kF_arb_Nm) * trF * trF / 2;
  const rollResR = (kR_wheel_Nm + kR_arb_Nm) * trR * trR / 2;
  const rollResTotal = rollResF + rollResR;
  const rollDistF = rollResTotal ? rollResF / rollResTotal : 0.5;

  const sprungWT_F = sprungWT * rollDistF;
  const sprungWT_R = sprungWT * (1 - rollDistF);

  const totalWT_F = uWT_F + rcWT_F + sprungWT_F;
  const totalWT_R = uWT_R + rcWT_R + sprungWT_R;
  const totalWT = totalWT_F + totalWT_R;

  // Roll angle at 1g lateral:
  //   M_overturning = sprung · g · (cogS − meanRC)    [N·m]
  //   φ = M / K_roll_total                            [rad]
  const overturning = sprung * 9.81 * (cogS - meanRC);  // N·m at 1g
  const rollAngleRad = rollResTotal > 0 ? overturning / rollResTotal : 0;
  const rollAngleDeg = rollAngleRad * (180/Math.PI);

  // Convert wheel rates back to N/mm for display (more workshop-friendly)
  const kF_wheel = kF_wheel_Nm / 1000;
  const kR_wheel = kR_wheel_Nm / 1000;
  const kF_arb = kF_arb_Nm / 1000;
  const kR_arb = kR_arb_Nm / 1000;

  return {
    wF, wR, total,
    sF, sR, sprung,
    weightSplitF: total ? wF/total : 0,
    weightSplitR: total ? wR/total : 0,
    uWT_F, uWT_R, rcWT_F, rcWT_R, sprungWT_F, sprungWT_R,
    totalWT_F, totalWT_R, totalWT,
    kF_wheel, kR_wheel, kF_arb, kR_arb,
    rollResF, rollResR, rollDistF,
    arbShareF: rollResF ? kF_arb / (kF_wheel + kF_arb) : 0,
    arbShareR: rollResR ? kR_arb / (kR_wheel + kR_arb) : 0,
    rollAngleDeg
  };
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('unitSys').value = unitSys;
  const v = document.getElementById('view');
  if (tab==='calc') v.innerHTML = renderCalc();
  else if (tab==='camber') { v.innerHTML = renderCamber(); requestAnimationFrame(drawCamberCharts); }
  else if (tab==='setup') v.innerHTML = renderSetup();
  else v.innerHTML = renderProfiles();
  bindInputs();
}

// ─── Camber kinematics ───────────────────────────────────────────────────────
// 2D kinematic solver. Looking from the rear of the car.
//   X = lateral, positive outboard (away from car centreline).
//   Z = vertical, positive up.
// "Wheel travel" = vertical motion of LCA outer pivot in chassis frame.
//   Positive travel = bump (wheel moves UP relative to chassis = chassis sinks).
//
// McPherson: knuckle is integral to strut; camber = strut angle from vertical.
// Double wishbone: knuckle joins LCA outer to UCA outer; camber = knuckle line angle from vertical.
//
// Returns array of {travel_mm, camber_deg, change_deg, change_per_mm}.
function solveCamber(geom){
  const out = [];
  const lca_len = Math.hypot(geom.lca.outer_x - geom.lca.inner_x, geom.lca.outer_z - geom.lca.inner_z);
  let knuckle_len = 0;
  let staticAngle;  // radians, from vertical, positive = top tilts outboard

  if (geom.type === 'wishbone') {
    knuckle_len = Math.hypot(geom.uca.outer_x - geom.lca.outer_x, geom.uca.outer_z - geom.lca.outer_z);
    staticAngle = Math.atan2(geom.uca.outer_x - geom.lca.outer_x, geom.uca.outer_z - geom.lca.outer_z);
  } else {
    staticAngle = Math.atan2(geom.strut_top.x - geom.lca.outer_x, geom.strut_top.z - geom.lca.outer_z);
  }

  const dx_static = geom.lca.outer_x - geom.lca.inner_x;
  const dx_sign = dx_static >= 0 ? 1 : -1;

  let prevCamber = null;
  for (let dz = -geom.travel_droop_mm; dz <= geom.travel_bump_mm + 0.001; dz += geom.step_mm) {
    const target_z = geom.lca.outer_z + dz;
    const dz_arm = target_z - geom.lca.inner_z;
    if (Math.abs(dz_arm) > lca_len) {
      out.push({travel_mm: dz, camber_deg: NaN, change_deg: NaN, change_per_mm: NaN});
      prevCamber = null; continue;
    }
    const new_dx = dx_sign * Math.sqrt(lca_len*lca_len - dz_arm*dz_arm);
    const lca_out = { x: geom.lca.inner_x + new_dx, z: target_z };

    let newAngle;
    if (geom.type === 'wishbone') {
      const uca_len = Math.hypot(geom.uca.outer_x - geom.uca.inner_x, geom.uca.outer_z - geom.uca.inner_z);
      const A_x = geom.uca.inner_x, A_z = geom.uca.inner_z;
      const B_x = lca_out.x, B_z = lca_out.z;
      const d = Math.hypot(B_x - A_x, B_z - A_z);
      if (d > uca_len + knuckle_len || d < Math.abs(uca_len - knuckle_len)) {
        out.push({travel_mm: dz, camber_deg: NaN, change_deg: NaN, change_per_mm: NaN});
        prevCamber = null; continue;
      }
      // Standard 2-circle intersection. Pick the solution closest to the static UCA outer.
      const a = (uca_len*uca_len - knuckle_len*knuckle_len + d*d) / (2*d);
      const h = Math.sqrt(Math.max(0, uca_len*uca_len - a*a));
      const Px = A_x + a * (B_x - A_x) / d;
      const Pz = A_z + a * (B_z - A_z) / d;
      const sol1 = { x: Px + h * (B_z - A_z) / d, z: Pz - h * (B_x - A_x) / d };
      const sol2 = { x: Px - h * (B_z - A_z) / d, z: Pz + h * (B_x - A_x) / d };
      const d1 = Math.hypot(sol1.x - geom.uca.outer_x, sol1.z - geom.uca.outer_z);
      const d2 = Math.hypot(sol2.x - geom.uca.outer_x, sol2.z - geom.uca.outer_z);
      const uca_out = d1 < d2 ? sol1 : sol2;
      newAngle = Math.atan2(uca_out.x - lca_out.x, uca_out.z - lca_out.z);
    } else {
      newAngle = Math.atan2(geom.strut_top.x - lca_out.x, geom.strut_top.z - lca_out.z);
    }

    const change_deg = (newAngle - staticAngle) * 180 / Math.PI;
    const camber_deg = geom.static_camber_deg + change_deg;
    const change_per_mm = prevCamber == null ? 0 : (camber_deg - prevCamber) / geom.step_mm;
    out.push({travel_mm: dz, camber_deg, change_deg, change_per_mm});
    prevCamber = camber_deg;
  }
  return out;
}

// Look up camber at a specific wheel travel (linear interp).
function camberAt(curve, travel_mm){
  if (!curve.length) return NaN;
  for (let i = 0; i < curve.length - 1; i++) {
    if (travel_mm >= curve[i].travel_mm && travel_mm <= curve[i+1].travel_mm) {
      const t = (travel_mm - curve[i].travel_mm) / (curve[i+1].travel_mm - curve[i].travel_mm);
      return curve[i].camber_deg + t * (curve[i+1].camber_deg - curve[i].camber_deg);
    }
  }
  return travel_mm < curve[0].travel_mm ? curve[0].camber_deg : curve[curve.length-1].camber_deg;
}

function renderCamber(){
  const p = getCurrent(); if (!p) return '<div class="section muted">No car.</div>';
  if (!p.camber) p.camber = JSON.parse(JSON.stringify(SEED[0].camber));
  const wtw = calc(p);
  const fG = p.camber.front;
  const rG = p.camber.rear;
  const fCurve = solveCamber(fG);
  const rCurve = solveCamber(rG);

  // Dynamic camber under 1g roll: outside wheel is compressed by roll_angle * track/2 (bump),
  // inside wheel is extended by the same (droop). Rough first-cut model.
  const rollRad = wtw.rollAngleDeg * Math.PI / 180;
  const bumpFront = (rollRad * (p.inputs.track_f/2));
  const bumpRear = (rollRad * (p.inputs.track_r/2));
  const fOutside = camberAt(fCurve, bumpFront);
  const fInside = camberAt(fCurve, -bumpFront);
  const rOutside = camberAt(rCurve, bumpRear);
  const rInside = camberAt(rCurve, -bumpRear);

  function geomBlock(label, g){
    const isWb = g.type === 'wishbone';
    return `<div class="card">
      <h3>${label} suspension</h3>
      <div class="row"><label>Type</label>
        <select data-cg="${label.toLowerCase()}" data-cf="type">
          <option value="mcpherson" ${g.type==='mcpherson'?'selected':''}>McPherson strut</option>
          <option value="wishbone" ${g.type==='wishbone'?'selected':''}>Double wishbone</option>
        </select>
      </div>
      <h4 style="margin:12px 0 4px;font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:0.6px">Lower control arm</h4>
      <div class="row"><label>Inner pivot X (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="lca" data-cf="inner_x" value="${g.lca.inner_x}" /></div>
      <div class="row"><label>Inner pivot Z (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="lca" data-cf="inner_z" value="${g.lca.inner_z}" /></div>
      <div class="row"><label>Outer (ball joint) X</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="lca" data-cf="outer_x" value="${g.lca.outer_x}" /></div>
      <div class="row"><label>Outer (ball joint) Z</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="lca" data-cf="outer_z" value="${g.lca.outer_z}" /></div>
      ${isWb ? `
      <h4 style="margin:12px 0 4px;font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:0.6px">Upper control arm</h4>
      <div class="row"><label>Inner pivot X (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="uca" data-cf="inner_x" value="${g.uca.inner_x}" /></div>
      <div class="row"><label>Inner pivot Z (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="uca" data-cf="inner_z" value="${g.uca.inner_z}" /></div>
      <div class="row"><label>Outer (ball joint) X</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="uca" data-cf="outer_x" value="${g.uca.outer_x}" /></div>
      <div class="row"><label>Outer (ball joint) Z</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="uca" data-cf="outer_z" value="${g.uca.outer_z}" /></div>
      ` : `
      <h4 style="margin:12px 0 4px;font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:0.6px">Strut top mount</h4>
      <div class="row"><label>Top mount X (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="strut_top" data-cf="x" value="${g.strut_top.x}" /></div>
      <div class="row"><label>Top mount Z (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cs="strut_top" data-cf="z" value="${g.strut_top.z}" /></div>
      `}
      <h4 style="margin:12px 0 4px;font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:0.6px">Setup + range</h4>
      <div class="row"><label>Static camber (°, − for neg)</label><input type="number" step="0.1" data-cg="${label.toLowerCase()}" data-cf="static_camber_deg" value="${g.static_camber_deg}" /></div>
      <div class="row"><label>Bump travel (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cf="travel_bump_mm" value="${g.travel_bump_mm}" /></div>
      <div class="row"><label>Droop travel (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cf="travel_droop_mm" value="${g.travel_droop_mm}" /></div>
      <div class="row"><label>Step (mm)</label><input type="number" data-cg="${label.toLowerCase()}" data-cf="step_mm" value="${g.step_mm}" /></div>
    </div>`;
  }

  function statsFor(curve, g){
    const valid = curve.filter(c => !isNaN(c.camber_deg));
    if (!valid.length) return null;
    const atZero = curve.find(c => Math.abs(c.travel_mm) < 0.5);
    const max = valid.reduce((a,b) => a.camber_deg > b.camber_deg ? a : b);
    const min = valid.reduce((a,b) => a.camber_deg < b.camber_deg ? a : b);
    const bump = curve.find(c => Math.abs(c.travel_mm - g.travel_bump_mm) < 0.5) || valid[valid.length-1];
    const droop = curve.find(c => Math.abs(c.travel_mm + g.travel_droop_mm) < 0.5) || valid[0];
    // Gain rate at static = (camber at +1mm − camber at −1mm) / 2
    const above = camberAt(curve, 1);
    const below = camberAt(curve, -1);
    const rate = (above - below) / 2;
    return { atZero, max, min, bump, droop, rate, swing: max.camber_deg - min.camber_deg };
  }
  const fS = statsFor(fCurve, fG);
  const rS = statsFor(rCurve, rG);

  return `<div class="section">
    <div class="grid-2">
      ${geomBlock('Front', fG)}
      ${geomBlock('Rear', rG)}
    </div>

    <h3 style="margin-top:22px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px">Front camber curve</h3>

      <div class="kpi"><div class="lbl">Gain rate at static</div><div class="val">${fS ? fS.rate.toFixed(4) : '—'}°/mm</div><div class="sub">${fS ? (fS.rate*25.4).toFixed(3)+'°/in' : ''}</div></div>
      <div class="kpi"><div class="lbl">Camber @ full bump (+${fG.travel_bump_mm}mm)</div><div class="val">${fS && fS.bump ? fS.bump.camber_deg.toFixed(2) : '—'}°</div><div class="sub">${fS && fS.bump ? (fS.bump.camber_deg - fG.static_camber_deg >= 0 ? '+' : '') + (fS.bump.camber_deg - fG.static_camber_deg).toFixed(2) + '° change' : ''}</div></div>
      <div class="kpi"><div class="lbl">Camber @ full droop (−${fG.travel_droop_mm}mm)</div><div class="val">${fS && fS.droop ? fS.droop.camber_deg.toFixed(2) : '—'}°</div><div class="sub">${fS && fS.droop ? (fS.droop.camber_deg - fG.static_camber_deg >= 0 ? '+' : '') + (fS.droop.camber_deg - fG.static_camber_deg).toFixed(2) + '° change' : ''}</div></div>
      <div class="kpi"><div class="lbl">Total swing</div><div class="val">${fS ? fS.swing.toFixed(2) : '—'}°</div></div>
      <div class="kpi"><div class="lbl">Outside wheel @ 1g roll</div><div class="val">${fOutside.toFixed(2)}°</div><div class="sub">roll angle ${wtw.rollAngleDeg.toFixed(2)}° × half-track</div></div>
      <div class="kpi"><div class="lbl">Inside wheel @ 1g roll</div><div class="val">${fInside.toFixed(2)}°</div><div class="sub">unloaded</div></div>
    </div>
    <div class="card" style="margin-top:10px;padding:10px">
      <canvas id="camberFrontChart" style="width:100%;height:240px;display:block"></canvas>
    </div>

    <h3 style="margin-top:22px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px">Rear camber curve</h3>
    <div class="grid-4" style="margin-top:8px">
      <div class="kpi"><div class="lbl">Static camber</div><div class="val">${rG.static_camber_deg.toFixed(2)}°</div></div>
      <div class="kpi"><div class="lbl">Gain rate at static</div><div class="val">${rS ? rS.rate.toFixed(4) : '—'}°/mm</div><div class="sub">${rS ? (rS.rate*25.4).toFixed(3)+'°/in' : ''}</div></div>
      <div class="kpi"><div class="lbl">Camber @ full bump (+${rG.travel_bump_mm}mm)</div><div class="val">${rS && rS.bump ? rS.bump.camber_deg.toFixed(2) : '—'}°</div></div>
      <div class="kpi"><div class="lbl">Camber @ full droop (−${rG.travel_droop_mm}mm)</div><div class="val">${rS && rS.droop ? rS.droop.camber_deg.toFixed(2) : '—'}°</div></div>
      <div class="kpi"><div class="lbl">Total swing</div><div class="val">${rS ? rS.swing.toFixed(2) : '—'}°</div></div>
      <div class="kpi"><div class="lbl">Outside wheel @ 1g roll</div><div class="val">${rOutside.toFixed(2)}°</div></div>
      <div class="kpi"><div class="lbl">Inside wheel @ 1g roll</div><div class="val">${rInside.toFixed(2)}°</div></div>
    </div>
    <div class="card" style="margin-top:10px;padding:10px">
      <canvas id="camberRearChart" style="width:100%;height:240px;display:block"></canvas>
    </div>

    <div class="card" style="margin-top:14px;padding:14px;line-height:1.6;color:var(--muted);font-size:12px">
      <b>How it works:</b> 2D kinematic solver, looking from the rear. X is lateral (positive outboard), Z is vertical (positive up).
      "Wheel travel" = vertical motion of LCA outer pivot in the chassis frame. Positive = bump.
      McPherson camber = strut-line angle from vertical. Wishbone camber = knuckle-line angle (LCA outer → UCA outer) from vertical.
      <br><br>
      <b>Dynamic camber under 1g roll</b> uses the WTW tab's roll angle. Outside wheel is compressed by <span class="kbd">roll × half-track</span>; inside wheel is extended by the same.
      First-cut model — assumes wheel stays on the ground, ignores chassis pitch and tyre deflection.
    </div>
  </div>`;
}

function drawCamberCharts(){
  const p = getCurrent(); if (!p || !p.camber) return;
  drawCamberChart('camberFrontChart', solveCamber(p.camber.front), p.camber.front, '#22d3ee');
  drawCamberChart('camberRearChart', solveCamber(p.camber.rear), p.camber.rear, '#f43f5e');
}

function drawCamberChart(id, curve, geom, colour){
  const cv = document.getElementById(id); if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  cv.width = cv.clientWidth * dpr; cv.height = cv.clientHeight * dpr;
  const ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);
  const w = cv.clientWidth, h = cv.clientHeight;
  ctx.clearRect(0,0,w,h); ctx.fillStyle = '#0d131c'; ctx.fillRect(0,0,w,h);
  const valid = curve.filter(c => !isNaN(c.camber_deg)); if (!valid.length) return;
  const xMin = -geom.travel_droop_mm, xMax = geom.travel_bump_mm;
  const camMin = Math.min(...valid.map(c=>c.camber_deg));
  const camMax = Math.max(...valid.map(c=>c.camber_deg));
  const yPad = (camMax - camMin) * 0.15 || 0.1;
  const yMin = camMin - yPad, yMax = camMax + yPad;
  const PAD_L = 50, PAD_R = 14, PAD_T = 12, PAD_B = 32;
  const W = w - PAD_L - PAD_R, H = h - PAD_T - PAD_B;
  const x = v => PAD_L + ((v - xMin) / (xMax - xMin)) * W;
  const y = v => PAD_T + H - ((v - yMin) / (yMax - yMin)) * H;
  ctx.strokeStyle = '#1a2332'; ctx.fillStyle='#6b7280'; ctx.font='10px -apple-system,system-ui';
  // x grid (wheel travel)
  const xStep = niceStep((xMax-xMin)/8);
  for (let v = Math.ceil(xMin/xStep)*xStep; v <= xMax; v += xStep) {
    const px = x(v);
    ctx.beginPath(); ctx.moveTo(px, PAD_T); ctx.lineTo(px, PAD_T+H); ctx.stroke();
    ctx.fillText(v.toFixed(0), px-8, PAD_T+H+13);
  }
  ctx.fillText('wheel travel (mm) — bump →', PAD_L+W/2-70, PAD_T+H+27);
  // y grid (camber)
  const yStep = niceStep((yMax-yMin)/6);
  for (let v = Math.ceil(yMin/yStep)*yStep; v <= yMax; v += yStep) {
    const py = y(v);
    ctx.beginPath(); ctx.moveTo(PAD_L, py); ctx.lineTo(PAD_L+W, py); ctx.stroke();
    ctx.fillText(v.toFixed(2), 4, py+3);
  }
  ctx.save(); ctx.translate(12, PAD_T+H/2+30); ctx.rotate(-Math.PI/2); ctx.fillText('camber (°)', 0, 0); ctx.restore();
  // zero-travel marker
  if (xMin <= 0 && xMax >= 0) {
    ctx.strokeStyle = '#374151'; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x(0), PAD_T); ctx.lineTo(x(0), PAD_T+H); ctx.stroke();
    ctx.setLineDash([]);
  }
  // curve
  ctx.strokeStyle = colour; ctx.lineWidth = 2; ctx.beginPath();
  let started = false;
  curve.forEach(c => {
    if (isNaN(c.camber_deg)) { started = false; return; }
    const px = x(c.travel_mm), py = y(c.camber_deg);
    if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py);
  });
  ctx.stroke();
  // static camber dot
  const zero = curve.find(c => Math.abs(c.travel_mm) < geom.step_mm/2 + 0.001);
  if (zero) { ctx.fillStyle = colour; ctx.beginPath(); ctx.arc(x(0), y(zero.camber_deg), 4, 0, Math.PI*2); ctx.fill(); }
}

function niceStep(v){ const p10 = Math.pow(10, Math.floor(Math.log10(Math.abs(v))||0)); const n = v/p10; if (n<2) return p10; if (n<5) return 2*p10; return 5*p10; }

}

function renderSessionTable(setups){
  let html = `<table><thead><tr><th>Date</th><th>Venue</th><th>Driver</th><th>F springs</th><th>R springs</th><th>F ARB</th><th>R ARB</th><th>F camber L/R</th><th>R camber L/R</th><th>Best lap</th><th></th></tr></thead><tbody>`;
  setups.slice().reverse().forEach((s,idx) => {
    const i = setups.length - 1 - idx;
    html += `<tr>
      <td>${escapeHtml(s.date||'')}</td>
      <td style="text-align:left">${escapeHtml(s.venue||'')}</td>
      <td style="text-align:left">${escapeHtml(s.driver||'')}</td>
      <td>${escapeHtml(s.f.springs||'')}</td>
      <td>${escapeHtml(s.r.springs||'')}</td>
      <td>${escapeHtml(s.f.arb||'')}</td>
      <td>${escapeHtml(s.r.arb||'')}</td>
      <td>${escapeHtml(s.f.camber_l||'')}/${escapeHtml(s.f.camber_r||'')}</td>
      <td>${escapeHtml(s.r.camber_l||'')}/${escapeHtml(s.r.camber_r||'')}</td>
      <td>${escapeHtml(s.lap||'')}</td>
      <td><button class="btn" onclick="deleteSession(${i})">×</button></td></tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function renderProfiles(){
  let html = `<div class="section"><div class="card">
    <h3>Cars on this machine</h3>
    <div class="profile-list">`;
  cars.forEach(c => {
    html += `<div class="profile-item ${c.id===currentId?'active':''}" onclick="selectCar('${c.id}')">${escapeHtml(c.name)} <span class="muted" style="float:right">${c.setups.length} session${c.setups.length===1?'':'s'}</span></div>`;
  });
  html += `</div>
    <div style="margin-top:14px"><label style="font-size:11px;color:var(--muted)">Rename current</label>
      <input class="row" id="renameInput" value="${escapeHtml(getCurrent()?.name||'')}" style="width:100%;text-align:left" /></div>
  </div></div>`;
  return html;
}

window.selectCar = id => { currentId = id; render(); };
window.deleteSession = i => { const p=getCurrent(); p.setups.splice(i,1); save(); render(); };

function bindInputs(){
  // unit toggle
  document.getElementById('unitSys').onchange = e => { unitSys = e.target.value; render(); };
  // tabs
  document.querySelectorAll('nav.tabs button').forEach(b => b.onclick = () => {
    document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    tab = b.dataset.tab;
    render();
  });
  // calc inputs
  if (tab === 'calc') {
    const fields = ['weight_f','weight_r','unsprung_f','unsprung_r','track_f','track_r','rc_f','rc_r','cog_unsprung_f','cog_unsprung_r','cog_sprung','spring_freq_f','spring_freq_r','arb_od_f','arb_id_f','arb_od_r','arb_id_r','arb_len_f','arb_len_r','arb_arm_f','arb_arm_r','arb_motion_f','arb_motion_r'];
    fields.forEach(f => {
      const el = document.getElementById(f);
      if (!el) return;
      el.oninput = () => { getCurrent().inputs[f] = +el.value; save(); render(); };
    });
  }
  if (tab === 'camber') {
    document.querySelectorAll('[data-cg]').forEach(el => {
      const handler = () => {
        const p = getCurrent(); if (!p) return;
        if (!p.camber) p.camber = JSON.parse(JSON.stringify(SEED[0].camber));
        const axle = el.dataset.cg;     // 'front' | 'rear'
        const sub  = el.dataset.cs;      // 'lca' | 'uca' | 'strut_top' | undefined
        const field = el.dataset.cf;
        const target = sub ? p.camber[axle][sub] : p.camber[axle];
        const v = el.value;
        target[field] = (el.tagName === 'SELECT') ? v : (v === '' ? 0 : +v);
        save(); render();
      };
      el.oninput = handler; el.onchange = handler;
    });
  }
  if (tab === 'profiles') {
    const r = document.getElementById('renameInput');
    if (r) r.oninput = () => { getCurrent().name = r.value; save(); };
  }
  document.getElementById('importFile').onchange = importFile;
}

function saveSession(){
  const p = getCurrent(); if (!p) return;
  const g = id => document.getElementById(id)?.value || '';
  const session = {
    date: g('s_date'), driver: g('s_driver'), venue: g('s_venue'),
    surface: g('s_surface'), event: g('s_event'), lap: g('s_lap'),
    f: { springs:g('s_f_springs'), damper:g('s_f_damper'), arb:g('s_f_arb'),
         camber_l:g('s_f_camber_l'), camber_r:g('s_f_camber_r'),
         caster_l:g('s_f_caster_l'), caster_r:g('s_f_caster_r'),
         toe:g('s_f_toe'), rh_l:g('s_f_rh_l'), rh_r:g('s_f_rh_r'), droop:g('s_f_droop') },
    r: { springs:g('s_r_springs'), damper:g('s_r_damper'), arb:g('s_r_arb'),
         camber_l:g('s_r_camber_l'), camber_r:g('s_r_camber_r'),
         toe:g('s_r_toe'), rh_l:g('s_r_rh_l'), rh_r:g('s_r_rh_r'), droop:g('s_r_droop') },
    cw: { fl:+g('s_cw_fl'), fr:+g('s_cw_fr'), rl:+g('s_cw_rl'), rr:+g('s_cw_rr') }
  };
  // push axle totals into WTW inputs
  const fSum = (session.cw.fl||0) + (session.cw.fr||0);
  const rSum = (session.cw.rl||0) + (session.cw.rr||0);
  if (fSum > 0) p.inputs.weight_f = fSum;
  if (rSum > 0) p.inputs.weight_r = rSum;
  p.setups.push(session);
  save(); render();
  alert('Session saved' + (fSum||rSum?' — axle totals pushed into WTW inputs':''));
}

function newProfile(){
  const name = prompt('Car name'); if (!name) return;
  const seed = JSON.parse(JSON.stringify(SEED[0]));
  seed.id = 'c_'+Date.now(); seed.name = name; seed.setups = [];
  cars.push(seed); currentId = seed.id; save(); render();
}
function dupProfile(){
  const p = getCurrent(); if (!p) return;
  const c = JSON.parse(JSON.stringify(p)); c.id = 'c_'+Date.now(); c.name = p.name+' (copy)'; c.setups = [];
  cars.push(c); currentId = c.id; save(); render();
}
function deleteProfile(){
  if (cars.length<=1) return alert('Need at least one car.');
  if (!confirm('Delete '+getCurrent().name+'?')) return;
  cars = cars.filter(c => c.id !== currentId); currentId = cars[0]?.id; save(); render();
}
function exportData(){
  const blob = new Blob([JSON.stringify({cars}, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'wtw-cars.json'; a.click();
}
function importFile(e){
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { const j = JSON.parse(r.result); cars = j.cars || j; currentId = cars[0]?.id; save(); render(); alert('Imported '+cars.length+' car(s).'); } catch(err){ alert('Import failed: '+err.message); } };
  r.readAsText(f); e.target.value='';
}
function reset(){
  if (!confirm('Reset to seed (Polo rally)?')) return;
  cars = JSON.parse(JSON.stringify(SEED)); currentId = cars[0].id; save(); render();
}
function escapeHtml(s){ return (s==null?'':(''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))); }

render();
</script>
