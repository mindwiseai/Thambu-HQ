function Badge({ children, color = 'var(--green)', bg }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '3px 9px', borderRadius: 4, fontSize: '0.78rem', fontWeight: 600,
      color, background: bg || (color === 'var(--green)' ? 'var(--green-dim)' : color === 'var(--red)' ? 'var(--red-dim)' : color === 'var(--amber)' ? 'var(--amber-dim)' : color === 'var(--blue)' ? 'var(--blue-dim)' : 'var(--purple-dim)'),
      letterSpacing: '0.03em', textTransform: 'uppercase',
    }}>{children}</span>
  );
}

function ProgressBar({ value, max, color = 'var(--green)', height = 4 }) {
  const pct = Math.min((value / max) * 100, 100);
  return (
    <div style={{ width: '100%', height, background: 'var(--surface-3)', borderRadius: height/2, overflow: 'hidden' }}>
      <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: height/2, transition: 'width 0.6s ease', animation: 'slideRight 0.8s ease' }} />
    </div>
  );
}

function Card({ children, style, onClick, hover = false }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      onClick={onClick}
      style={{
        background: 'var(--surface)',
        border: `1px solid ${hovered && hover ? 'var(--border-hover)' : 'var(--border)'}`,
        borderRadius: 8, padding: 20,
        transition: 'border-color 0.2s, transform 0.2s',
        transform: hovered && hover ? 'translateY(-1px)' : 'none',
        cursor: onClick ? 'pointer' : 'default',
        ...style,
      }}
    >
      {children}
    </div>
  );
}

function SectionHeader({ title, subtitle, action }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 16 }}>
      <div>
        <h2 style={{ fontSize: '1.15rem', fontWeight: 600, color: 'var(--text)', letterSpacing: '-0.01em' }}>{title}</h2>
        {subtitle && <p style={{ fontSize: '0.88rem', color: 'var(--text-muted)', marginTop: 3 }}>{subtitle}</p>}
      </div>
      {action}
    </div>
  );
}

// ─── Countdown Component ───────────────────────────────────────

function Countdown() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);

  const diff = LAUNCH_DATE - now;
  const days = Math.max(0, Math.floor(diff / 86400000));
  const hours = Math.max(0, Math.floor((diff % 86400000) / 3600000));
  const mins = Math.max(0, Math.floor((diff % 3600000) / 60000));
  const secs = Math.max(0, Math.floor((diff % 60000) / 1000));

  const Unit = ({ val, label }) => (
    <div style={{ textAlign: 'center' }}>
      <div className="mono" style={{ fontSize: '2rem', fontWeight: 700, color: 'var(--green)', lineHeight: 1 }}>{String(val).padStart(2, '0')}</div>
      <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)', marginTop: 4, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 500 }}>{label}</div>
    </div>
  );

  return (
    <div style={{ display: 'flex', gap: 24, alignItems: 'center' }}>
      <Unit val={days} label="Days" />
      <span style={{ color: 'var(--text-dim)', fontSize: '1.5rem', marginTop: -12 }}>:</span>
      <Unit val={hours} label="Hours" />
      <span style={{ color: 'var(--text-dim)', fontSize: '1.5rem', marginTop: -12 }}>:</span>
      <Unit val={mins} label="Mins" />
      <span style={{ color: 'var(--text-dim)', fontSize: '1.5rem', marginTop: -12 }}>:</span>
      <Unit val={secs} label="Secs" />
    </div>
  );
}

// ─── Tasks Panel ───────────────────────────────────────────────

function TasksPanel({ tasks, setTasks }) {
  const [filter, setFilter] = useState('all');
  const [newTask, setNewTask] = useState('');
  const [newPriority, setNewPriority] = useState('medium');

  const filtered = tasks.filter(t => {
    if (filter === 'open') return !t.done;
    if (filter === 'done') return t.done;
    if (filter === 'high') return !t.done && t.priority === 'high';
    return true;
  });

  const toggleTask = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));

  const addTask = () => {
    if (!newTask.trim()) return;
    setTasks(prev => [...prev, { id: Date.now(), text: newTask.trim(), priority: newPriority, category: 'general', done: false, due: '' }]);
    setNewTask('');
  };

  const removeTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));

  const filters = [
    { id: 'all', label: `All (${tasks.length})` },
    { id: 'open', label: `Open (${tasks.filter(t=>!t.done).length})` },
    { id: 'high', label: `Urgent (${tasks.filter(t=>!t.done && t.priority==='high').length})` },
    { id: 'done', label: `Done (${tasks.filter(t=>t.done).length})` },
  ];

  return (
    <div className="fade-in">
      <SectionHeader title="Task Board" subtitle="Track and manage all action items" />

      <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
        {filters.map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)} style={{
            padding: '6px 12px', borderRadius: 6, border: '1px solid', fontSize: '0.8rem', cursor: 'pointer', fontFamily: 'inherit',
            background: filter === f.id ? 'var(--green-dim)' : 'transparent',
            borderColor: filter === f.id ? 'var(--green)' : 'var(--border)',
            color: filter === f.id ? 'var(--green)' : 'var(--text-muted)',
          }}>{f.label}</button>
        ))}
      </div>

      <Card style={{ marginBottom: 16, padding: 12 }}>
        <div style={{ display: 'flex', gap: 8 }}>
          <input
            value={newTask} onChange={e => setNewTask(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addTask()}
            placeholder="Add a new task..."
            style={{ flex: 1, padding: '8px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface-2)', color: 'var(--text)', fontSize: '0.9rem', fontFamily: 'inherit', outline: 'none' }}
          />
          <select value={newPriority} onChange={e => setNewPriority(e.target.value)} style={{ padding: '8px 10px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface-2)', color: 'var(--text)', fontSize: '0.8rem', fontFamily: 'inherit', cursor: 'pointer' }}>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button onClick={addTask} style={{ padding: '8px 16px', borderRadius: 6, border: 'none', background: 'var(--green)', color: 'var(--bg)', fontWeight: 600, fontSize: '0.9rem', cursor: 'pointer', fontFamily: 'inherit' }}>Add</button>
        </div>
      </Card>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {filtered.map((task, i) => (
          <div key={task.id} style={{
            display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
            background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 6,
            opacity: task.done ? 0.5 : 1, animation: `fadeIn 0.3s ease ${i * 0.03}s both`,
          }}>
            <button onClick={() => toggleTask(task.id)} style={{
              width: 20, height: 20, borderRadius: 4, border: `2px solid ${task.done ? 'var(--green)' : 'var(--border-hover)'}`,
              background: task.done ? 'var(--green)' : 'transparent', cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--bg)', fontSize: '0.7rem', flexShrink: 0,
            }}>{task.done ? '✓' : ''}</button>
            <span style={{ flex: 1, fontSize: '0.88rem', textDecoration: task.done ? 'line-through' : 'none', color: task.done ? 'var(--text-muted)' : 'var(--text)' }}>{task.text}</span>
            <Badge color={task.priority === 'high' ? 'var(--red)' : task.priority === 'medium' ? 'var(--amber)' : 'var(--text-muted)'}>{task.priority}</Badge>
            {task.due && <span className="mono" style={{ fontSize: '0.78rem', color: 'var(--text-dim)' }}>{task.due}</span>}
            <button onClick={() => removeTask(task.id)} style={{ background: 'none', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', fontSize: '1rem', padding: '0 4px' }}>×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

            {COMPETITORS.map((c, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: i < COMPETITORS.length-1 ? '1px solid var(--border)' : 'none' }}>

                  <div className="mono" style={{ fontSize: '0.9rem', color: 'var(--text-muted)' }}>{c.price}</div>

          </div>
        </Card>

        <Card>
          <SectionHeader title="Brand Enemy" subtitle='"Placebo Wellness"' />

          <div style={{ fontWeight: 600, marginBottom: 8, fontSize: '0.9rem' }}>Global Brand Heritage</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {[
              { brand: 'KeenMind', market: 'Australia, SA, Middle East', status: '20+ year flagship' },
              { brand: 'MemoPlus Gold', market: 'Philippines', status: 'Celebrity-endorsed' },
              { brand: 'Memory Perfect', market: 'Europe', status: 'Active' },

        </Card>
      </div>
    </div>
  );
}

// ─── Notes Panel ───────────────────────────────────────────────

function NotesPanel({ notes, setNotes }) {
  const [newNote, setNewNote] = useState('');
  const [newTag, setNewTag] = useState('general');

  const addNote = () => {
    if (!newNote.trim()) return;
    setNotes(prev => [{ id: Date.now(), text: newNote.trim(), date: new Date().toISOString().split('T')[0], tag: newTag }, ...prev]);
    setNewNote('');
  };

  const removeNote = (id) => setNotes(prev => prev.filter(n => n.id !== id));

  const tagColors = { strategy: 'var(--blue)', pricing: 'var(--amber)', team: 'var(--purple)', general: 'var(--text-muted)', product: 'var(--green)' };

  return (
    <div className="fade-in">
      <SectionHeader title="Strategic Notes" subtitle="Key insights, advice, and decisions" />

      <Card style={{ marginBottom: 16, padding: 12 }}>
        <div style={{ display: 'flex', gap: 8 }}>
          <textarea
            value={newNote} onChange={e => setNewNote(e.target.value)}
            placeholder="Capture a note, insight, or decision..."
            rows={2}
            style={{ flex: 1, padding: '8px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface-2)', color: 'var(--text)', fontSize: '0.9rem', fontFamily: 'inherit', outline: 'none', resize: 'vertical' }}
          />
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <select value={newTag} onChange={e => setNewTag(e.target.value)} style={{ padding: '6px 8px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface-2)', color: 'var(--text)', fontSize: '0.75rem', fontFamily: 'inherit', cursor: 'pointer' }}>
              <option value="general">General</option>
              <option value="strategy">Strategy</option>
              <option value="pricing">Pricing</option>
              <option value="team">Team</option>
              <option value="product">Product</option>
            </select>
            <button onClick={addNote} style={{ padding: '6px 14px', borderRadius: 6, border: 'none', background: 'var(--green)', color: 'var(--bg)', fontWeight: 600, fontSize: '0.8rem', cursor: 'pointer', fontFamily: 'inherit' }}>Save</button>
          </div>
        </div>
      </Card>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {notes.map((note, i) => (
          <Card key={note.id} style={{ padding: 14, animation: `fadeIn 0.3s ease ${i * 0.04}s both` }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
              <Badge color={tagColors[note.tag] || 'var(--text-muted)'}>{note.tag}</Badge>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className="mono" style={{ fontSize: '0.78rem', color: 'var(--text-dim)' }}>{note.date}</span>
                <button onClick={() => removeNote(note.id)} style={{ background: 'none', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', fontSize: '0.9rem' }}>×</button>
              </div>
            </div>
            <div style={{ fontSize: '0.88rem', lineHeight: 1.5 }}>{note.text}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

// ─── Tools Panel ───────────────────────────────────────────────

function ToolsPanel() {
  const [filter, setFilter] = useState('all');
  const categories = ['all', ...new Set(TOOLS_REGISTRY.map(t => t.category))];
  const filtered = filter === 'all' ? TOOLS_REGISTRY : TOOLS_REGISTRY.filter(t => t.category === filter);

  return (
    <div className="fade-in">
      <SectionHeader title="Tools & Integrations" subtitle="Active tools and future capabilities" />

      <div style={{ display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' }}>
        {categories.map(c => (
          <button key={c} onClick={() => setFilter(c)} style={{
            padding: '5px 10px', borderRadius: 6, border: '1px solid', fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'inherit', textTransform: 'capitalize',
            background: filter === c ? 'var(--green-dim)' : 'transparent',
            borderColor: filter === c ? 'var(--green)' : 'var(--border)',
            color: filter === c ? 'var(--green)' : 'var(--text-muted)',
          }}>{c}</button>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
        {filtered.map((tool, i) => (
          <Card key={i} hover style={{ animation: `fadeIn 0.3s ease ${i * 0.04}s both` }}>
            <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <div style={{ fontSize: '1.5rem', width: 36, textAlign: 'center', flexShrink: 0 }}>{tool.icon}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 2 }}>
                  <span style={{ fontWeight: 600, fontSize: '0.9rem' }}>{tool.name}</span>
                  <Badge color={tool.status === 'active' ? 'var(--green)' : 'var(--text-muted)'}>{tool.status === 'active' ? 'active' : 'coming soon'}</Badge>
                </div>
                <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>{tool.desc}</div>
              </div>
            </div>
          </Card>
        ))}

        <Card hover style={{ border: '1px dashed var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 80 }}>
          <div style={{ textAlign: 'center', color: 'var(--text-dim)' }}>
            <div style={{ fontSize: '1.5rem', marginBottom: 4 }}>+</div>
            <div style={{ fontSize: '0.9rem' }}>Add New Tool</div>
          </div>
        </Card>
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────

function App() {
  const [activeTab, setActiveTab] = useState('overview');
  const [tasks, setTasks] = useState(TASKS_INIT);
  const [notes, setNotes] = useState(NOTES_INIT);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  const renderPanel = () => {
    switch (activeTab) {
      case 'overview': return <OverviewPanel tasks={tasks} onNav={setActiveTab} />;
      case 'timeline': return <TimelinePanel />;
      case 'tasks': return <TasksPanel tasks={tasks} setTasks={setTasks} />;
      case 'budget': return <BudgetPanel />;
      case 'social': return <SocialIdentityPanel />;
      case 'audiences': return <AudiencesPanel />;
      case 'channels': return <ChannelsPanel />;
      case 'intel': return <IntelPanel />;
      case 'team': return <TeamPanel />;
      case 'notes': return <NotesPanel notes={notes} setNotes={setNotes} />;
      case 'tools': return <ToolsPanel />;
      default: return <OverviewPanel tasks={tasks} onNav={setActiveTab} />;
    }
  };

  const navIcons = {
    overview: '◉', timeline: '◎', tasks: '☑', budget: '₹', social: '◐', audiences: '👤',
    channels: '⊞', intel: '◈', team: '◇', notes: '✎', tools: '⚙',
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      {/* Sidebar */}
      <div style={{
        width: sidebarCollapsed ? 56 : 200, flexShrink: 0, background: 'var(--surface)',
        borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column',
        transition: 'width 0.25s ease', overflow: 'hidden',
      }}>
        {/* Brand header */}
        <div style={{ padding: sidebarCollapsed ? '16px 8px' : '20px 16px', borderBottom: '1px solid var(--border)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{
              width: 32, height: 32, borderRadius: 6, background: 'var(--green)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontWeight: 800, fontSize: '0.9rem', color: 'var(--bg)', flexShrink: 0,
            }}>M</div>
            {!sidebarCollapsed && (
              <div>
                <div style={{ fontWeight: 700, fontSize: '0.95rem', letterSpacing: '-0.02em' }}>MINDWISE</div>
                <div style={{ fontSize: '0.68rem', color: 'var(--text-dim)', letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 500 }}>Mission Control</div>
              </div>
            )}
          </div>
        </div>

        {/* Nav */}
        <nav style={{ flex: 1, padding: '8px 6px' }}>
          {NAV_ITEMS.map(item => (
            <button
              key={item.id}
              onClick={() => setActiveTab(item.id)}
              style={{
                width: '100%', display: 'flex', alignItems: 'center', gap: 10,
                padding: sidebarCollapsed ? '10px 0' : '9px 10px', marginBottom: 2,
                borderRadius: 6, border: 'none', cursor: 'pointer',
                fontFamily: 'inherit', fontSize: '0.9rem', textAlign: 'left',
                justifyContent: sidebarCollapsed ? 'center' : 'flex-start',
                background: activeTab === item.id ? 'var(--green-dim)' : 'transparent',
                color: activeTab === item.id ? 'var(--green)' : 'var(--text-muted)',
                fontWeight: activeTab === item.id ? 600 : 400,
                transition: 'all 0.15s',
              }}
              title={item.label}
            >
              <span style={{ fontSize: '0.9rem', width: 20, textAlign: 'center', flexShrink: 0 }}>{navIcons[item.id]}</span>
              {!sidebarCollapsed && <span>{item.label}</span>}
            </button>
          ))}
        </nav>

        {/* Collapse toggle */}
        <button
          onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
          style={{
            padding: 12, border: 'none', borderTop: '1px solid var(--border)',
            background: 'transparent', color: 'var(--text-dim)', cursor: 'pointer',
            fontSize: '0.9rem', fontFamily: 'inherit',
          }}
        >
          {sidebarCollapsed ? '→' : '← Collapse'}
        </button>
      </div>

      {/* Main content */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        {/* Top bar */}
        <header style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '12px 24px', borderBottom: '1px solid var(--border)', background: 'var(--surface)',
        }}>
          <div>
            <span style={{ fontSize: '0.8rem', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              {NAV_ITEMS.find(n => n.id === activeTab)?.label}
            </span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
            <Countdown />
            <div style={{
              padding: '6px 12px', borderRadius: 6, background: 'var(--green-dim)',
              color: 'var(--green)', fontSize: '0.75rem', fontWeight: 600, letterSpacing: '0.05em',
            }}>
              LAUNCH: JUN 1
            </div>
          </div>
        </header>

        {/* Content area */}
        <main style={{ flex: 1, padding: 24, overflowY: 'auto' }}>
          {renderPanel()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
